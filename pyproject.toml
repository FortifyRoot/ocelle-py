[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fortifyroot-sdk"
version = "0.1.0"
description = "FortifyRoot SDK for LLM observability."
readme = "README.md"
requires-python = ">=3.10,<4"
authors = [
  { name = "FortifyRoot", email = "founders@fortifyroot.com" }
]

dependencies = [
  "traceloop-sdk==0.50.1"
]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]

# ------------------
# Tooling config
# ------------------

[tool.black]
line-length = 88
target-version = ["py310"]

[tool.ruff]
line-length = 88
target-version = "py310"
select = ["E", "F", "I"]
ignore = []

[tool.ruff.isort]
known-first-party = ["fortifyroot"]
