name: Tests CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on hardcoded secrets or credentials
        shell: bash
        run: |
          set -euo pipefail

          # ── LLM provider API keys ──────────────────────────────────────
          # OpenAI / OpenRouter          sk-proj-*, sk-or-v1-*
          # Anthropic                    sk-ant-*
          # Groq                         gsk_*
          # Google AI / GCP API key      AIzaSy* (39 chars)
          # FortifyRoot                  fr_sk_*
          #
          # ── Cloud credentials ──────────────────────────────────────────
          # AWS Access Key ID            AKIA + 16 alphanum
          # GCP service account JSON     (detects service_account type field)
          # GitHub PAT                   ghp_* / github_pat_*
          #
          # ── Env-var assignments (catches copy-paste from .env) ─────────
          # OPENAI_API_KEY=sk-...  ANTHROPIC_API_KEY=sk-ant-...  etc.

          key_patterns='(sk-(proj-)?[A-Za-z0-9_-]{20,}|sk-or-v1-[A-Za-z0-9]{20,}|sk-ant-[A-Za-z0-9_-]{20,}|gsk_[A-Za-z0-9_-]{20,}|AIzaSy[A-Za-z0-9_-]{33}|AKIA[A-Z0-9]{16}|fr_sk_[A-Za-z0-9_-]{30,}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,})'
          env_patterns='(OPENAI_API_KEY[[:space:]]*[:=][[:space:]]*["'"'"']?sk-|OPENROUTER_API_KEY[[:space:]]*[:=][[:space:]]*["'"'"']?sk-or-|ANTHROPIC_API_KEY[[:space:]]*[:=][[:space:]]*["'"'"']?sk-ant-|GOOGLE_API_KEY[[:space:]]*[:=][[:space:]]*["'"'"']?AIza)'
          json_patterns='("type"[[:space:]]*:[[:space:]]*"service_account")'
          regex="(${key_patterns}|${env_patterns}|${json_patterns})"

          if git grep -nI -E "$regex" -- . \
              ':(exclude)poetry.lock' \
              ':(exclude)uv.lock' \
              ':(exclude)*.env.example' \
              ':(exclude)*.env.*.example' \
              ':(exclude).github/workflows/*'; then
            echo "::error::Potential hardcoded secret or credential detected. Remove it and use placeholders or GitHub Secrets."
            exit 1
          fi

          echo "No hardcoded secrets or credentials detected."

  # ---------------------------------------------------------------------
  # Actionlint — lint .github/workflows/*.yml for GHA semantic errors +
  # embedded `run:` shellcheck issues. Pinned to a specific image tag
  # for reproducibility.
  # ---------------------------------------------------------------------
  actionlint:
    name: Actionlint (workflow lint)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -no-color -oneline

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: secret-scan
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --with test --no-interaction

      - name: Run tests
        env:
          OPENAI_BASE_URL: https://api.openai.com/v1
          OPENAI_TEST_MODEL: gpt-4.1
        run: poetry run pytest tests -q
