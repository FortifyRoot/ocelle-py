name: Publish to PyPI

# Manual workflow_dispatch only. The job validates the tag, checks the
# SDK release-gate status on the resolved SHA, then checks out that SHA
# and publishes with PyPI Trusted Publishing.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'SDK release tag that passed the gate (e.g. v1.0.0rc1 or v1.0.0)'
        required: true
      pypi_repository:
        description: 'PyPI repository (testpypi for rc, pypi for final)'
        required: false
        default: 'testpypi'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish ${{ inputs.release_tag }} to ${{ inputs.pypi_repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ inputs.pypi_repository == 'testpypi' && 'testpypi' || 'pypi' }}
    outputs:
      version: ${{ steps.tag.outputs.version }}
      pypi_repository: ${{ steps.tag.outputs.pypi_repository }}
    steps:
      - name: Validate release tag and target repository
        id: tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          PYPI_REPOSITORY: ${{ inputs.pypi_repository }}
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::release_tag is required."
            exit 1
          fi
          case "$PYPI_REPOSITORY" in
            pypi|testpypi) ;;
            *)
              echo "::error::pypi_repository must be 'pypi' or 'testpypi'."
              exit 1
              ;;
          esac
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+rc[0-9]+$ ]]; then
            TAG_KIND="rc"
          elif [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_KIND="final"
          else
            echo "::error::Tag '$RELEASE_TAG' must be vX.Y.ZrcN or vX.Y.Z."
            exit 1
          fi
          if [[ "$TAG_KIND" == "rc" && "$PYPI_REPOSITORY" != "testpypi" ]]; then
            echo "::error::RC tags may only publish to TestPyPI."
            exit 1
          fi
          if [[ "$TAG_KIND" == "final" && "$PYPI_REPOSITORY" != "pypi" ]]; then
            echo "::error::Final tags may only publish to PyPI."
            exit 1
          fi
          VERSION="${RELEASE_TAG#v}"
          {
            echo "release_tag=$RELEASE_TAG"
            echo "tag_kind=$TAG_KIND"
            echo "version=$VERSION"
            echo "pypi_repository=$PYPI_REPOSITORY"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release tag to commit SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          SHA="$(gh api "repos/${{ github.repository }}/commits/${RELEASE_TAG}" --jq '.sha' 2>/dev/null || echo "")"
          if [[ -z "$SHA" ]]; then
            echo "::error::Could not resolve commit SHA for tag '$RELEASE_TAG'."
            exit 1
          fi
          echo "release tag $RELEASE_TAG resolves to SHA $SHA"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Validate SDK release-gate commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          set -euo pipefail
          context="fr-system-tests / sdk-rc"
          state="$(gh api "repos/${{ github.repository }}/commits/${SHA}/statuses" \
            --jq "[.[] | select(.context==\"$context\")] | sort_by(.updated_at) | last | .state // empty")"
          if [[ "$state" != "success" ]]; then
            echo "::error::No green SDK release-gate status on ${SHA} (got: '${state}')."
            echo "::error::Run the SDK release tag gate and wait for it to finish first."
            exit 1
          fi
          echo "SDK release-gate status is success on $SHA"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate pyproject version matches tag
        env:
          EXPECTED_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          actual="$(python -c 'import pathlib, tomllib; data = tomllib.loads(pathlib.Path("pyproject.toml").read_text()); print(data["tool"]["poetry"]["version"])')"
          if [[ "$actual" != "$EXPECTED_VERSION" ]]; then
            echo "::error::pyproject.toml version '$actual' does not match tag version '$EXPECTED_VERSION'."
            exit 1
          fi
          echo "pyproject.toml version matches tag: $actual"

      - name: Install pinned build deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade 'pip==24.3.1'
          pip install 'build==1.2.2.post1'

      - name: Build distributions
        run: python -m build

      - name: Publish accepted rc to TestPyPI
        if: inputs.pypi_repository == 'testpypi'
        # pypa/gh-action-pypi-publish release/v1 resolved 2026-06-30.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish final release to PyPI
        if: inputs.pypi_repository != 'testpypi'
        # pypa/gh-action-pypi-publish release/v1 resolved 2026-06-30.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  verify-published-install:
    name: Verify published install from ${{ needs.publish.outputs.pypi_repository }}
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create clean verification venv
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          if [[ -z "$VERSION" ]]; then
            echo "::error::Missing published package version."
            exit 1
          fi
          venv="/tmp/ocelle-publish-verify-${VERSION}"
          python -m venv "$venv"
          # shellcheck disable=SC1091
          source "$venv/bin/activate"
          python -m pip install --upgrade pip

      - name: Verify published TestPyPI install
        if: needs.publish.outputs.pypi_repository == 'testpypi'
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          venv="/tmp/ocelle-publish-verify-${VERSION}"
          # shellcheck disable=SC1091
          source "$venv/bin/activate"
          for attempt in {1..12}; do
            echo "TestPyPI install verification attempt ${attempt}/12 for fortifyroot-ocelle==${VERSION}."
            if python -m pip install --no-cache-dir \
                --index-url https://test.pypi.org/simple/ \
                --extra-index-url https://pypi.org/simple/ \
                "fortifyroot-ocelle==${VERSION}"; then
              break
            fi

            if [[ "$attempt" == "12" ]]; then
              echo "::error::Published TestPyPI install verification failed after ${attempt} attempts."
              exit 1
            fi
            sleep 10
          done

      - name: Verify published PyPI install
        if: needs.publish.outputs.pypi_repository == 'pypi'
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          venv="/tmp/ocelle-publish-verify-${VERSION}"
          # shellcheck disable=SC1091
          source "$venv/bin/activate"
          for attempt in {1..12}; do
            echo "PyPI install verification attempt ${attempt}/12 for fortifyroot-ocelle==${VERSION}."
            if python -m pip install --no-cache-dir "fortifyroot-ocelle==${VERSION}"; then
              break
            fi

            if [[ "$attempt" == "12" ]]; then
              echo "::error::Published PyPI install verification failed after ${attempt} attempts."
              exit 1
            fi
            sleep 10
          done

      - name: Verify published import and version
        env:
          VERSION: ${{ needs.publish.outputs.version }}
        run: |
          set -euo pipefail
          venv="/tmp/ocelle-publish-verify-${VERSION}"
          # shellcheck disable=SC1091
          source "$venv/bin/activate"
          python - <<'PY'
          import importlib.metadata
          import os

          import fortifyroot.ocelle as ocelle

          expected = os.environ["VERSION"]
          installed = importlib.metadata.version("fortifyroot-ocelle")
          if installed != expected:
              raise SystemExit(
                  f"installed package version {installed!r} != expected {expected!r}"
              )
          if ocelle.__version__ != expected:
              raise SystemExit(
                  f"fortifyroot.ocelle.__version__ {ocelle.__version__!r} != expected {expected!r}"
              )
          print(ocelle)
          PY
