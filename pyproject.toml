[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fortifyroot-sdk"
dynamic = ["version"]
description = "FortifyRoot SDK for LLM Observability"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "FortifyRoot", email = "sdk@fortifyroot.com" },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]
keywords = [
    "llm",
    "genai",
    "observability",
    "tracing",
    "opentelemetry",
    "langchain",
    "openai",
    "anthropic",
]
dependencies = [
    "traceloop-sdk>=0.50.0,<0.51.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
]

[project.urls]
Homepage = "https://fortifyroot.com"
Documentation = "https://docs.fortifyroot.com"
Repository = "https://github.com/fortifyroot/fortifyroot-sdk"
Changelog = "https://github.com/fortifyroot/fortifyroot-sdk/blob/main/CHANGELOG.md"

[tool.hatch.version]
path = "src/fortifyroot/version.py"

[tool.hatch.build.targets.sdist]
include = [
    "/src",
]

[tool.hatch.build.targets.wheel]
packages = ["src/fortifyroot"]

[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311", "py312"]

[tool.isort]
profile = "black"
line_length = 88

[tool.ruff]
line-length = 88
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
